  .error-msg{color:var(--danger);font-size:.85rem;margin-top:8px;display:none}

S Aïzè", "arrondissement": "sagon"}, {"name": "cs86", "label": "CS Sagon", "arrondissement": "sagon"}, {"name": "cs87", "label": "MI Houédja", "arrondissement": "sagon"}, {"name": "cs88", "label": "MI Tévêdji", "arrondissement": "sagon"}, {"name": "cs89", "label": "CS Tohoues", "arrondissement": "tohoues"}, {"name": "cs90", "label": "MI Akassa", "arrondissement": "tohoues"}];
const QUEUE_KEY = "queue_" + FORM_KEY;

let currentAnswers = {};
let startTime = new Date();

function normId(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'_'); }

function fieldId(f, idx){ return 'f_' + idx + '_' + normId(f.column).slice(0,40); }

function renderOptions(f, idx){
  const name = fieldId(f, idx);
  let html = '<div class="options">';
  f.options.forEach((opt, oi) => {
    const optId = name + '_' + oi;
    html += `<label class="opt" id="${optId}_wrap" for="${optId}">
      <input type="radio" id="${optId}" name="${name}" value="${escapeHtml(opt)}" onchange="onFieldChange('${f.column.replace(/'/g,"\\'")}','${f.key||''}', this.value, '${optId}_wrap', '${name}')">
      <span>${escapeHtml(opt)}</span>
    </label>`;
  });
  html += '</div>';
  return html;
}

function escapeHtml(s){ return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderField(f, idx){
  const name = fieldId(f, idx);
  let inner = '';
  if (f.type === 'radio'){
    inner = renderOptions(f, idx);
  } else if (f.type === 'text'){
    inner = `<input type="text" id="${name}" oninput="onTextChange('${f.column.replace(/'/g,"\\'")}', this.value)">`;
  } else if (f.type === 'textarea'){
    inner = `<textarea id="${name}" oninput="onTextChange('${f.column.replace(/'/g,"\\'")}', this.value)"></textarea>`;
  } else if (f.type === 'integer'){
    const minAttr = (f.min!==undefined) ? ` min="${f.min}"` : '';
    const maxAttr = (f.max!==undefined) ? ` max="${f.max}"` : '';
    inner = `<input type="number" inputmode="numeric" id="${name}"${minAttr}${maxAttr} oninput="onIntChange('${f.column.replace(/'/g,"\\'")}', this.value, ${f.min!==undefined?f.min:'null'}, ${f.max!==undefined?f.max:'null'}, '${name}')">`;
    if (f.min!==undefined && f.max!==undefined){
      inner += `<div class="hint">Entre ${f.min} et ${f.max} ans</div>`;
    }
  }
  const reqStar = f.required ? '<span class="req"> *</span>' : '';
  return `<div class="field" id="wrap_${name}" data-relevant='${f.relevant?JSON.stringify(f.relevant):''}'>
    <label class="qlabel">${escapeHtml(f.label)}${reqStar}</label>
    ${inner}
  </div>`;
}

function onTextChange(column, value){
  currentAnswers[column] = value;
}

let intRangeErrors = {};
function onIntChange(column, value, min, max, inputId){
  currentAnswers[column] = value;
  const el = document.getElementById(inputId);
  const n = parseInt(value, 10);
  let bad = false;
  if (value === '') bad = false; // handled by required check separately
  else if (min !== null && max !== null && (isNaN(n) || n < min || n > max)) bad = true;
  intRangeErrors[column] = bad;
  if (el) el.style.borderColor = bad ? '#c0392b' : '#dfe4ea';
}

function onFieldChange(column, key, value, wrapId, groupName){
  currentAnswers[column] = value;
  if (key) currentAnswers['__key_' + key] = value;
  // visual highlight
  document.querySelectorAll(`input[name="${groupName}"]`).forEach(inp=>{
    document.getElementById(inp.id + '_wrap').classList.toggle('selected', inp.checked);
  });
  recomputeVisibility();
}

function recomputeVisibility(){
  document.querySelectorAll('[data-relevant]').forEach(el=>{
    const rel = el.getAttribute('data-relevant');
    if (!rel) return;
    const cond = JSON.parse(rel);
    const val = currentAnswers['__key_' + cond.field];
    const show = (val === cond.equals);
    el.classList.toggle('hidden', !show);
  });
}

function renderCascading(){
  // Commune / Arrondissement / Structure — always inserted first
  let html = `<div class="group"><h2>📍 Localisation</h2>`;
  if (HAS_ENQUETEUR){
    html += `<div class="field"><label class="qlabel">Identification de l'enquêteur<span class="req"> *</span></label>
      <select id="sel_enqueteur" onchange="currentAnswers[\"Identification de l\\'enquêteur\"]=this.value">
      <option value="">-- Choisir --</option>` +
      ENQUETEURS.map(e=>`<option value="${escapeHtml(e.label)}">${escapeHtml(e.label)}</option>`).join('') +
      `</select></div>`;
  }
  html += `<div class="field"><label class="qlabel">Commune<span class="req"> *</span></label>
    <select id="sel_commune" onchange="onCommuneChange(this.value)">
    <option value="">-- Choisir --</option>` +
    COMMUNES.map(c=>`<option value="${escapeHtml(c.label)}" data-name="${c.name}">${escapeHtml(c.label)}</option>`).join('') +
    `</select></div>`;
  html += `<div class="field"><label class="qlabel">Arrondissement<span class="req"> *</span></label>
    <select id="sel_arrond" onchange="onArrondChange(this.value)"><option value="">-- Choisir la commune d'abord --</option></select></div>`;
  html += `<div class="field"><label class="qlabel">Structure<span class="req"> *</span></label>
    <select id="sel_structure" onchange="currentAnswers['Structure']=this.value"><option value="">-- Choisir l'arrondissement d'abord --</option></select></div>`;
  html += `</div>`;
  return html;
}

function onCommuneChange(label){
  currentAnswers['Commune'] = label;
  const c = COMMUNES.find(x=>x.label===label);
  const arrondSel = document.getElementById('sel_arrond');
  const structSel = document.getElementById('sel_structure');
  currentAnswers['Arrondissement'] = ''; currentAnswers['Structure']='';
  structSel.innerHTML = '<option value="">-- Choisir l\'arrondissement d\'abord --</option>';
  if (!c){ arrondSel.innerHTML = '<option value="">-- Choisir la commune d\'abord --</option>'; return; }
  const list = ARRONDS.filter(a=>a.commune===c.name);
  arrondSel.innerHTML = '<option value="">-- Choisir --</option>' + list.map(a=>`<option value="${escapeHtml(a.label)}" data-name="${a.name}">${escapeHtml(a.label)}</option>`).join('');
}

function onArrondChange(label){
  currentAnswers['Arrondissement'] = label;
  const a = ARRONDS.find(x=>x.label===label);
  const structSel = document.getElementById('sel_structure');
  currentAnswers['Structure']='';
  if (!a){ structSel.innerHTML = '<option value="">-- Choisir l\'arrondissement d\'abord --</option>'; return; }
  const list = STRUCTS.filter(s=>s.arrondissement===a.name);
  structSel.innerHTML = '<option value="">-- Choisir --</option>' + list.map(s=>`<option value="${escapeHtml(s.label)}">${escapeHtml(s.label)}</option>`).join('');
}
document.addEventListener('change', e=>{
  if (e.target && e.target.id === 'sel_structure'){ currentAnswers['Structure'] = e.target.value; }
});

function render(){
  const root = document.getElementById('fieldsRoot');
  let html = renderCascading();
  let idx = 0;
  let lastGroup = null;
  SCHEMA.forEach(f=>{
    if (f.group !== lastGroup){
      if (lastGroup !== null) html += '</div>';
      html += `<div class="group"><h2>${escapeHtml(f.group||'')}</h2>`;
      lastGroup = f.group;
    }
    html += renderField(f, idx);
    idx++;
  });
  if (lastGroup !== null) html += '</div>';
  root.innerHTML = html;
  recomputeVisibility();
}

function validate(){
  let ok = true;
  const missing = [];
  if (!currentAnswers['Commune']) { ok=false; missing.push('Commune'); }
  if (!currentAnswers['Arrondissement']) { ok=false; missing.push('Arrondissement'); }
  if (!currentAnswers['Structure']) { ok=false; missing.push('Structure'); }
  if (HAS_ENQUETEUR && !currentAnswers["Identification de l'enquêteur"]) { ok=false; }
  SCHEMA.forEach((f, idx)=>{
    if (!f.required) return;
    const wrap = document.getElementById('wrap_' + fieldId(f, idx));
    if (wrap && wrap.classList.contains('hidden')) return; // skip hidden/non-relevant
    const val = currentAnswers[f.column];
    if (val === undefined || val === null || val === '') { ok = false; if(wrap) wrap.style.outline='2px solid #c0392b'; }
    else if (intRangeErrors[f.column]) { ok = false; if(wrap) wrap.style.outline='2px solid #c0392b'; }
    else if (wrap) wrap.style.outline='';
  });
  return ok;
}

function buildPayload(){
  const data = Object.assign({}, currentAnswers);
  // remove internal helper keys
  Object.keys(data).forEach(k=>{ if (k.indexOf('__key_')===0) delete data[k]; });
  if (HAS_GEO_TECH){
    data['today'] = new Date().toISOString().slice(0,10);
  }
  if (HAS_START_END){
    data['start'] = startTime.toISOString();
    data['end'] = new Date().toISOString();
  }
  return data;
}

// Géolocalisation démarrée tôt (en tâche de fond) pour ne jamais bloquer l'envoi.
let lastKnownPosition = null;
function startBackgroundGeolocation(){
  if (!HAS_GEO_TECH || !navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos=>{ lastKnownPosition = pos; }, ()=>{}, {timeout:8000, maximumAge:60000});
}
function applyGeolocationIfAvailable(){
  if (!HAS_GEO_TECH || !lastKnownPosition) return;
  const pos = lastKnownPosition;
  currentAnswers['start-geopoint'] = pos.coords.latitude+' '+pos.coords.longitude+' '+(pos.coords.altitude||0)+' '+(pos.coords.accuracy||0);
  currentAnswers['_start-geopoint_latitude'] = pos.coords.latitude;
  currentAnswers['_start-geopoint_longitude'] = pos.coords.longitude;
  currentAnswers['_start-geopoint_altitude'] = pos.coords.altitude || '';
  currentAnswers['_start-geopoint_precision'] = pos.coords.accuracy || '';
}

function onSubmit(){
  document.getElementById('errorMsg').style.display='none';
  if (!validate()){
    document.getElementById('errorMsg').style.display='block';
    document.getElementById('errorMsg').scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Enregistrement...';
  applyGeolocationIfAvailable(); // instantané : n'attend jamais le GPS
  const payload = buildPayload();
  sendOrQueue(payload, ()=>{
    btn.disabled = false; btn.textContent = '✅ Enregistrer la réponse';
  });
}

function sendOrQueue(payload, done){
  if (!navigator.onLine){
    queueSubmission(payload);
    showToast('Hors connexion : réponse sauvegardée localement.');
    resetForm();
    done();
    return;
  }
  callApi(SUBMIT_FN, payload)
    .then(res => { if (res && res.ok){ showToast('✅ Réponse enregistrée avec succès.'); resetForm(); done(); updateQueueBadge(); } else { queueSubmission(payload); showToast('Connexion instable : réponse sauvegardée localement.'); resetForm(); done(); } })
    .catch(() => { queueSubmission(payload); showToast('Connexion instable : réponse sauvegardée localement.'); resetForm(); done(); });
}

function queueSubmission(payload){
  const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  q.push(payload);
  localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
  updateQueueBadge();
}

function updateQueueBadge(){
  const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  const el = document.getElementById('qCount');
  if (q.length > 0){ el.style.display='inline-block'; el.textContent = q.length; }
  else { el.style.display='none'; }
  const banner = document.getElementById('status-banner');
  if (!navigator.onLine){
    banner.className = 'offline'; banner.textContent = '⚠️ Hors connexion — les réponses seront sauvegardées localement.';
  } else if (q.length > 0){
    banner.className = 'queued'; banner.textContent = q.length + ' réponse(s) en attente de synchronisation.';
  } else {
    banner.className = ''; banner.textContent='';
  }
}

function syncQueue(manual){
  const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  if (q.length === 0){ if(manual) showToast('Aucune réponse en attente.'); return; }
  if (!navigator.onLine){ if(manual) showToast('Toujours hors connexion.'); return; }
  let remaining = q.slice();
  function next(){
    if (remaining.length === 0){ localStorage.setItem(QUEUE_KEY, JSON.stringify(remaining)); updateQueueBadge(); if(manual) showToast('✅ Synchronisation terminée.'); return; }
    const item = remaining[0];
    callApi(SUBMIT_FN, item)
      .then(res => { if (res && res.ok){ remaining.shift(); localStorage.setItem(QUEUE_KEY, JSON.stringify(remaining)); updateQueueBadge(); next(); } else { localStorage.setItem(QUEUE_KEY, JSON.stringify(remaining)); updateQueueBadge(); if(manual) showToast('Synchronisation interrompue (connexion).'); } })
      .catch(() => { localStorage.setItem(QUEUE_KEY, JSON.stringify(remaining)); updateQueueBadge(); if(manual) showToast('Synchronisation interrompue (connexion).'); });
  }
  next();
}

function resetForm(){
  currentAnswers = {};
  startTime = new Date();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  setTimeout(()=>{ t.style.display='none'; }, 3000);
}

window.addEventListener('online', ()=>{ updateQueueBadge(); syncQueue(false); });
window.addEventListener('offline', updateQueueBadge);

render();
updateQueueBadge();
syncQueue(false);
startBackgroundGeolocation();
</script>
