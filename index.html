<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0F5C56">
<title>Satisfaction Usager - Centres de Santé</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
    --ink:#12312B;
    --paper:#EEF3F2;
    --card:#FFFFFF;
    --teal:#0F5C56;
    --teal-dark:#0A3D39;
    --gold:#C9A227;
    --line:#D7E0DE;
    --danger:#B3441E;
    --ok:#1E7A4C;
    --muted:#5B6E6A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
    min-height:100vh;
    padding-bottom:100px;
  }
  /* ---- Barre de statut (élément signature) ---- */
  #statusBar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    gap:8px;
    padding:8px 14px;
    font-size:13px; font-weight:600;
    color:#fff;
    background:var(--teal-dark);
    border-bottom:3px solid var(--gold);
  }
  #statusBar.offline{ background:var(--danger); }
  #statusBar .dot{ width:8px; height:8px; border-radius:50%; background:#fff; display:inline-block; margin-right:6px; }
  #statusBar button{
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.4);
    color:#fff; border-radius:20px; padding:4px 12px; font-size:12px; font-weight:700;
    cursor:pointer;
  }
  #statusBar button:active{ background:rgba(255,255,255,0.3); }

  header.app-header{
    text-align:center; padding:22px 16px 8px;
  }
  header.app-header h1{
    font-size:19px; margin:0 0 4px; letter-spacing:.2px; color:var(--teal-dark);
  }
  header.app-header p{ margin:0; font-size:13px; color:var(--muted); }

  /* ---- Barre de progression ---- */
  #progressWrap{ padding:14px 16px 0; }
  #progressTrack{
    height:6px; background:var(--line); border-radius:6px; overflow:hidden;
  }
  #progressFill{
    height:100%; background:linear-gradient(90deg,var(--teal),var(--gold)); width:0%;
    transition:width .25s ease;
  }
  #progressLabel{ font-size:12px; color:var(--muted); margin-top:6px; text-align:right; }

  main{ max-width:560px; margin:0 auto; padding:0 16px; }

  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:20px 18px 22px;
    margin-top:16px;
    box-shadow:0 1px 3px rgba(15,60,55,.08);
    border:1px solid var(--line);
  }
  .card .section-title{
    display:flex; align-items:center; gap:10px;
    font-size:17px; font-weight:700; color:var(--teal-dark);
    margin:0 0 16px;
  }
  .card .section-title .emoji{ font-size:22px; }

  .field{ margin-bottom:22px; }
  .field:last-child{ margin-bottom:0; }
  .field label.q{
    display:block; font-size:15px; font-weight:600; margin-bottom:10px; line-height:1.35;
  }
  .field .req{ color:var(--danger); }

  .options{ display:flex; flex-direction:column; gap:8px; }
  .opt{
    display:flex; align-items:center; gap:10px;
    border:1.5px solid var(--line); border-radius:10px;
    padding:12px 14px; cursor:pointer;
    font-size:14.5px;
    background:#fff;
    transition:border-color .15s, background .15s;
  }
  .opt input{ accent-color:var(--teal); width:18px; height:18px; flex-shrink:0; }
  .opt.selected{ border-color:var(--teal); background:#EAF3F1; font-weight:600; }
  .opt:active{ background:#EAF3F1; }

  select, input[type=text], input[type=number], textarea{
    width:100%; font-size:15px; padding:12px 14px;
    border:1.5px solid var(--line); border-radius:10px;
    font-family:inherit; background:#fff; color:var(--ink);
  }
  select:focus, input:focus, textarea:focus{
    outline:2px solid var(--teal); outline-offset:1px; border-color:var(--teal);
  }
  textarea{ min-height:90px; resize:vertical; }

  .hint{ font-size:12.5px; color:var(--muted); margin-top:6px; }
  .error-msg{ font-size:12.5px; color:var(--danger); margin-top:6px; font-weight:600; display:none; }
  .field.invalid .error-msg{ display:block; }
  .field.invalid .opt, .field.invalid select, .field.invalid input, .field.invalid textarea{
    border-color:var(--danger);
  }

  /* ---- Navigation ---- */
  #navBar{
    position:fixed; bottom:0; left:0; right:0; z-index:40;
    background:#fff; border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:flex; gap:10px; justify-content:center;
    box-shadow:0 -2px 10px rgba(0,0,0,.06);
  }
  #navBar .wrap{ max-width:560px; width:100%; display:flex; gap:10px; }
  button.nav-btn{
    flex:1; padding:14px; border-radius:12px; font-size:15.5px; font-weight:700;
    border:none; cursor:pointer;
  }
  button.btn-prev{ background:#fff; border:1.5px solid var(--line); color:var(--ink); flex:0 0 90px; }
  button.btn-next{ background:var(--teal); color:#fff; }
  button.btn-submit{ background:var(--gold); color:var(--teal-dark); }
  button.nav-btn:active{ transform:scale(.98); }
  button.nav-btn:disabled{ opacity:.5; }

  /* ---- Écran de fin ---- */
  #doneScreen{ display:none; text-align:center; padding:60px 24px; }
  #doneScreen .big-check{ font-size:56px; }
  #doneScreen h2{ color:var(--teal-dark); }
  #doneScreen button{
    margin-top:18px; background:var(--teal); color:#fff; border:none;
    padding:14px 22px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer;
  }

  .queue-note{ font-size:12px; color:var(--muted); text-align:center; padding:10px 16px 0; }
</style>
</head>
<body>

<div id="statusBar">
  <span><span class="dot"></span><span id="statusText">Vérification…</span></span>
  <button id="syncBtn" type="button">Synchroniser</button>
</div>

<header class="app-header">
  <h1>Enquête de satisfaction — Centres de santé</h1>
  <p>Fonctionne sans connexion. Les fiches s'envoient automatiquement dès que le réseau revient.</p>
</header>

<div id="progressWrap">
  <div id="progressTrack"><div id="progressFill"></div></div>
  <div id="progressLabel"></div>
</div>

<main>
  <div id="formCard" class="card"></div>
  <div id="doneScreen">
    <div class="big-check">✅</div>
    <h2>Fiche enregistrée</h2>
    <p id="doneMsg"></p>
    <button id="newFormBtn">Remplir une nouvelle fiche</button>
  </div>
</main>

<div id="navBar">
  <div class="wrap">
    <button class="nav-btn btn-prev" id="btnPrev">← Retour</button>
    <button class="nav-btn btn-next" id="btnNext">Suivant →</button>
  </div>
</div>

// ====== À MODIFIER APRÈS DÉPLOIEMENT DU GOOGLE APPS SCRIPT (voir GUIDE-DEPLOIEMENT.md) ======
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFuxkxmKPFgDRs8DmFKeN9GWVw-sEbDxP4-69g8a7C7sKqmvH_ZciIyJ9kkpQXKC47/exec";
const SHARED_SECRET = "Mourede";
// ================================================================================================

let currentStep = 0;
let answers = {};
let visibleSections = [];

function computeVisibleSections(){
  return SECTIONS.filter(s => !s.relevant || s.relevant(answers));
}

function fieldHtml(f){
  const val = answers[f.name];
  let inner = '';
  if(f.type === 'radio'){
    inner = '<div class="options">' + f.options.map(o => {
      const sel = val === o.value ? ' selected' : '';
      return `<label class="opt${sel}"><input type="radio" name="${f.name}" value="${o.value}" ${val===o.value?'checked':''}> ${o.label}</label>`;
    }).join('') + '</div>';
  } else if(f.type === 'select'){
    const opts = f.optionsFn ? f.optionsFn(answers[f.dependsOn]) : f.options;
    const disabled = f.dependsOn && !answers[f.dependsOn] ? 'disabled' : '';
    inner = `<select name="${f.name}" ${disabled}>
      <option value="">— Choisir —</option>
      ${opts.map(o=>`<option value="${o.value}" ${val===o.value?'selected':''}>${o.label}</option>`).join('')}
    </select>`;
    if(disabled) inner += `<div class="hint">Sélectionnez d'abord le champ précédent.</div>`;
  } else if(f.type === 'text'){
    inner = `<input type="text" name="${f.name}" value="${val||''}" placeholder="Réponse...">`;
  } else if(f.type === 'integer'){
    inner = `<input type="number" name="${f.name}" value="${val||''}" min="${f.min||''}" max="${f.max||''}" inputmode="numeric" placeholder="Âge en années">`;
  } else if(f.type === 'textarea'){
    inner = `<textarea name="${f.name}" placeholder="Réponse libre...">${val||''}</textarea>`;
  }
  return `<div class="field" data-field="${f.name}">
    <label class="q">${f.label} ${f.required?'<span class="req">*</span>':''}</label>
    ${inner}
    <div class="error-msg">Cette réponse est requise.</div>
  </div>`;
}

function render(){
  visibleSections = computeVisibleSections();
  if(currentStep >= visibleSections.length) currentStep = visibleSections.length - 1;
  const section = visibleSections[currentStep];
  const card = document.getElementById('formCard');
  card.innerHTML = `<div class="section-title"><span class="emoji">${section.emoji}</span>${section.title}</div>`
    + section.fields.map(fieldHtml).join('');
  card.style.display = 'block';
  document.getElementById('doneScreen').style.display = 'none';

  attachFieldListeners(section);

  const pct = Math.round(((currentStep) / (visibleSections.length)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Section ${currentStep+1} / ${visibleSections.length}`;

  document.getElementById('btnPrev').disabled = currentStep === 0;
  const isLast = currentStep === visibleSections.length - 1;
  const nextBtn = document.getElementById('btnNext');
  nextBtn.textContent = isLast ? 'Terminer et enregistrer ✓' : 'Suivant →';
  nextBtn.className = 'nav-btn ' + (isLast ? 'btn-submit' : 'btn-next');

  window.scrollTo({top:0, behavior:'instant'});
}

function attachFieldListeners(section){
  section.fields.forEach(f => {
    const wrap = document.querySelector(`[data-field="${f.name}"]`);
    if(f.type === 'radio'){
      wrap.querySelectorAll('input[type=radio]').forEach(inp => {
        inp.addEventListener('change', () => {
          answers[f.name] = inp.value;
          wrap.classList.remove('invalid');
          render();
        });
      });
    } else if(f.type === 'select'){
      const sel = wrap.querySelector('select');
      sel.addEventListener('change', () => {
        answers[f.name] = sel.value;
        SECTIONS.forEach(s => s.fields.forEach(ff => {
          if(ff.dependsOn === f.name) delete answers[ff.name];
        }));
        wrap.classList.remove('invalid');
        render();
      });
    } else if(f.type === 'text' || f.type === 'integer'){
      const inp = wrap.querySelector('input');
      inp.addEventListener('input', () => {
        answers[f.name] = inp.value;
        wrap.classList.remove('invalid');
        saveDraft();
      });
    } else if(f.type === 'textarea'){
      const ta = wrap.querySelector('textarea');
      ta.addEventListener('input', () => {
        answers[f.name] = ta.value;
        wrap.classList.remove('invalid');
        saveDraft();
      });
    }
  });
}

function validateCurrentSection(){
  const section = visibleSections[currentStep];
  let ok = true;
  section.fields.forEach(f => {
    if(!f.required) return;
    const wrap = document.querySelector(`[data-field="${f.name}"]`);
    const val = answers[f.name];
    if(val === undefined || val === null || String(val).trim() === ''){
      wrap.classList.add('invalid');
      ok = false;
    } else {
      wrap.classList.remove('invalid');
    }
  });
  return ok;
}

document.getElementById('btnNext').addEventListener('click', () => {
  if(!validateCurrentSection()){
    document.querySelector('.field.invalid').scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }
  saveDraft();
  const isLast = currentStep === visibleSections.length - 1;
  if(isLast){
    finishAndQueue();
  } else {
    currentStep++;
    render();
  }
});

document.getElementById('btnPrev').addEventListener('click', () => {
  if(currentStep > 0){ currentStep--; render(); }
});

document.getElementById('newFormBtn').addEventListener('click', () => {
  answers = {};
  currentStep = 0;
  clearDraft();
  document.getElementById('doneScreen').style.display = 'none';
  render();
});

// ============ Stockage local (IndexedDB) : fonctionne réellement hors-ligne ============
const DB_NAME = 'satisfaction_cs_db';
const DB_VERSION = 1;
let dbPromise = null;

function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains('outbox')){
        db.createObjectStore('outbox', {keyPath:'localId'});
      }
      if(!db.objectStoreNames.contains('draft')){
        db.createObjectStore('draft', {keyPath:'id'});
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e);
  });
  return dbPromise;
}

async function saveDraft(){
  try{
    const db = await openDB();
    const tx = db.transaction('draft', 'readwrite');
    tx.objectStore('draft').put({id:'current', answers, currentStep});
  }catch(e){ console.warn('saveDraft failed', e); }
}

async function loadDraft(){
  try{
    const db = await openDB();
    return await new Promise((resolve) => {
      const tx = db.transaction('draft', 'readonly');
      const req = tx.objectStore('draft').get('current');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  }catch(e){ return null; }
}

async function clearDraft(){
  try{
    const db = await openDB();
    const tx = db.transaction('draft', 'readwrite');
    tx.objectStore('draft').delete('current');
  }catch(e){ /* ignore */ }
}

async function addToOutbox(record){
  try{
    const db = await openDB();
    const tx = db.transaction('outbox', 'readwrite');
    tx.objectStore('outbox').put(record);
    return await new Promise((resolve) => { tx.oncomplete = () => resolve(); });
  }catch(e){
    console.error('addToOutbox failed — fiche non sauvegardée !', e);
    alert("Erreur : impossible d'enregistrer la fiche sur l'appareil. Réessayez, ou libérez de l'espace de stockage.");
  }
}

async function getOutbox(){
  try{
    const db = await openDB();
    return await new Promise((resolve) => {
      const tx = db.transaction('outbox', 'readonly');
      const req = tx.objectStore('outbox').getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
  }catch(e){ console.warn('getOutbox failed', e); return []; }
}

async function removeFromOutbox(localId){
  try{
    const db = await openDB();
    const tx = db.transaction('outbox', 'readwrite');
    tx.objectStore('outbox').delete(localId);
    return await new Promise((resolve) => { tx.oncomplete = () => resolve(); });
  }catch(e){ console.warn('removeFromOutbox failed', e); }
}

// ============ Fin, mise en file, et envoi ============
function finishAndQueue(){
  const record = {
    localId: 'sub_' + Date.now() + '_' + Math.random().toString(36).slice(2,8),
    submittedAt: new Date().toISOString(),
    secret: SHARED_SECRET,
    data: {...answers}
  };
  addToOutbox(record).then(() => {
    clearDraft();
    document.getElementById('formCard').style.display = 'none';
    const done = document.getElementById('doneScreen');
    done.style.display = 'block';
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressLabel').textContent = 'Terminé';
    refreshOutboxCount();
    trySyncOutbox();
  });
}

// ============ Synchronisation avec Google Sheets ============
let syncing = false;

async function trySyncOutbox(){
  if(syncing) return;
  if(!navigator.onLine) { updateStatusBar(); return; }
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf('COLLER_ICI') !== -1){
    updateStatusBar();
    return; // pas encore configuré
  }
  syncing = true;
  updateStatusBar('sync');
  const items = await getOutbox();
  for(const item of items){
    try{
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain;charset=utf-8'}, // évite le preflight CORS
        body: JSON.stringify(item)
      });
      // Apps Script en mode "no-cors" implicite peut renvoyer une réponse opaque selon config;
      // ici la réponse est lisible car le déploiement autorise "Anyone".
      let ok = resp.ok;
      try{ const j = await resp.json(); ok = ok && j.status === 'ok'; }catch(e){ /* réponse non-JSON : on considère quand même envoyé si resp.ok */ }
      if(ok){
        await removeFromOutbox(item.localId);
      }
    }catch(err){
      console.warn('Échec envoi, restera en file', err);
      break; // on s'arrête au premier échec, on retentera plus tard
    }
  }
  syncing = false;
  refreshOutboxCount();
  updateStatusBar();
}

let pendingCount = 0;
async function refreshOutboxCount(){
  const items = await getOutbox();
  pendingCount = items.length;
  updateStatusBar();
}

function updateStatusBar(mode){
  const bar = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  const online = navigator.onLine;
  bar.classList.toggle('offline', !online);
  if(mode === 'sync'){
    text.textContent = 'Synchronisation en cours…';
  } else if(!online){
    text.textContent = pendingCount > 0
      ? `Hors-ligne — ${pendingCount} fiche(s) en attente d'envoi`
      : 'Hors-ligne — les fiches seront enregistrées sur l\'appareil';
  } else if(pendingCount > 0){
    text.textContent = `En ligne — envoi de ${pendingCount} fiche(s) en attente…`;
  } else {
    text.textContent = 'En ligne — tout est synchronisé';
  }
}

document.getElementById('syncBtn').addEventListener('click', () => trySyncOutbox());
window.addEventListener('online', () => trySyncOutbox());
window.addEventListener('offline', () => updateStatusBar());
setInterval(() => trySyncOutbox(), 60000); // nouvelle tentative chaque minute si en ligne

// ============ Démarrage ============
async function init(){
  if('serviceWorker' in navigator){
    try{ await navigator.serviceWorker.register('sw.js'); }catch(e){ console.warn('SW non enregistré', e); }
  }
  const draft = await loadDraft();
  if(draft){
    answers = draft.answers || {};
    currentStep = draft.currentStep || 0;
  }
  await refreshOutboxCount();
  updateStatusBar();
  render();
}
init();
